<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Shopping Arcade Building</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #1a1a2e; font-family: 'Segoe UI', sans-serif; }
  canvas { display: block; }

  /* ── TOGGLE BUTTONS (always visible) ── */
  .toggle-btn {
    position: fixed; z-index: 200;
    width: 40px; height: 40px; border-radius: 10px;
    background: rgba(10,10,30,0.85); backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.18); color: #e0e0e0;
    font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 16px rgba(0,0,0,0.5); transition: background 0.2s, border-color 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  .toggle-btn:hover, .toggle-btn.open { background: rgba(40,40,80,0.95); border-color: rgba(100,180,255,0.45); }
  #toggle-controls { top: 16px; left: 16px; }
  #toggle-legend   { top: 16px; right: 16px; }

  /* ── PANELS ── */
  #ui-panel, #legend {
    position: fixed; z-index: 100;
    background: rgba(10,10,30,0.92); backdrop-filter: blur(14px);
    border: 1px solid rgba(255,255,255,0.12); border-radius: 12px;
    padding: 16px 18px; color: #e0e0e0;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    /* hidden by default */
    opacity: 0; pointer-events: none;
    transform: translateY(-8px);
    transition: opacity 0.22s ease, transform 0.22s ease;
  }
  #ui-panel.visible, #legend.visible {
    opacity: 1; pointer-events: auto; transform: translateY(0);
  }
  #ui-panel { top: 64px; left: 16px; min-width: 230px; }
  #legend   { top: 64px; right: 16px; font-size: 12px; }

  #ui-panel h2 { font-size: 14px; font-weight: 600; margin-bottom: 12px; color: #fff; letter-spacing: 0.4px; }
  .control-group { margin-bottom: 11px; }
  .control-group label { display: block; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: #888; margin-bottom: 5px; }
  .btn-row { display: flex; gap: 5px; flex-wrap: wrap; }
  .btn { padding: 5px 11px; border: 1px solid rgba(255,255,255,0.15); border-radius: 6px;
    background: rgba(255,255,255,0.05); color: #ccc; font-size: 12px; cursor: pointer; transition: all 0.2s;
    -webkit-tap-highlight-color: transparent; }
  .btn:hover  { background: rgba(255,255,255,0.15); color: #fff; }
  .btn.active { background: rgba(100,180,255,0.25); border-color: rgba(100,180,255,0.5); color: #fff; }

  #legend h3 { font-size: 12px; margin-bottom: 9px; color: #fff; }
  .legend-item { display: flex; align-items: center; gap: 7px; margin-bottom: 5px; }
  .legend-color { width: 13px; height: 13px; border-radius: 3px; border: 1px solid rgba(255,255,255,0.2); flex-shrink:0; }


</style>
</head>
<body>

<!-- Toggle buttons -->
<button id="toggle-controls" class="toggle-btn" title="Building Controls" onclick="togglePanel('ui-panel','toggle-controls')">⚙️</button>
<button id="toggle-legend"   class="toggle-btn" title="Legend"            onclick="togglePanel('legend','toggle-legend')">🗺️</button>

<!-- Controls panel (hidden by default) -->
<div id="ui-panel">
  <h2>🏢 Building Controls</h2>
  <div class="control-group">
    <label>View Floor</label>
    <div class="btn-row">
      <button class="btn active" onclick="showFloor('all')">All</button>
      <button class="btn" onclick="showFloor(0)">Ground</button>
      <button class="btn" onclick="showFloor(1)">2nd</button>
      <button class="btn" onclick="showFloor(2)">3rd</button>
    </div>
  </div>
  <div class="control-group">
    <label>Wall Transparency</label>
    <div class="btn-row">
      <button class="btn" onclick="setTransparency(0.2)">Glass</button>
      <button class="btn active" onclick="setTransparency(0.5)">Semi</button>
      <button class="btn" onclick="setTransparency(0.85)">Solid</button>
    </div>
  </div>
  <div class="control-group">
    <label>View Angle</label>
    <div class="btn-row">
      <button class="btn" onclick="setView('front')">Front</button>
      <button class="btn" onclick="setView('top')">Top</button>
      <button class="btn" onclick="setView('side')">Side</button>
      <button class="btn" onclick="setView('perspective')">3D</button>
    </div>
  </div>
</div>

<!-- Legend panel (hidden by default) -->
<div id="legend">
  <h3>Legend</h3>
  <div class="legend-item"><div class="legend-color" style="background:#e07850"></div> Shops (Row A)</div>
  <div class="legend-item"><div class="legend-color" style="background:#5088c0"></div> Shops (Row B)</div>
  <div class="legend-item"><div class="legend-color" style="background:#70a060"></div> Walkway / Seating</div>
  <div class="legend-item"><div class="legend-color" style="background:#c0a040"></div> Staircases (Row A end)</div>
  <div class="legend-item"><div class="legend-color" style="background:#888860"></div> Ground: Moto Parking</div>
  <div class="legend-item"><div class="legend-color" style="background:#4a9060"></div> 1F &amp; 3F: Planter Balcony</div>
  <div class="legend-item"><div class="legend-color" style="background:#a070c0"></div> Residential (3F)</div>
  <div class="legend-item"><div class="legend-color" style="background:#60b0a0"></div> Rooftop Balcony</div>
</div>



<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ── Panel toggle ──────────────────────────────────────────────
function togglePanel(panelId, btnId) {
  const panel = document.getElementById(panelId);
  const btn   = document.getElementById(btnId);
  const open  = panel.classList.toggle('visible');
  btn.classList.toggle('open', open);
}
// Tap outside to close
document.addEventListener('pointerdown', function(e) {
  for (const [panelId, btnId] of [['ui-panel','toggle-controls'],['legend','toggle-legend']]) {
    const panel = document.getElementById(panelId);
    const btn   = document.getElementById(btnId);
    if (panel.classList.contains('visible') &&
        !panel.contains(e.target) && !btn.contains(e.target)) {
      panel.classList.remove('visible');
      btn.classList.remove('open');
    }
  }
});

// ============================================
// SCENE SETUP
// ============================================
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);
scene.fog = new THREE.FogExp2(0x1a1a2e, 0.003);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 500);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = false;
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0x404060, 0.6));
const dirLight = new THREE.DirectionalLight(0xffeedd, 1.0);
dirLight.position.set(50, 80, 30);
dirLight.castShadow = false;
scene.add(dirLight);
const fillLight = new THREE.DirectionalLight(0x8090c0, 0.3);
fillLight.position.set(-30, 40, -20);
scene.add(fillLight);

// ============================================
// DIMENSIONS  (1 unit = 1 foot)
// ============================================
const LAND_W  = 45;
const LAND_L  = 82;
const FLOOR_H = 11;
const WALL_T  = 0.4;

const BALCONY_W  = 2;
const SHOP_DEPTH = 14;
const WALKWAY_W  = 11;

const ROW_A_X = -(WALKWAY_W/2 + SHOP_DEPTH/2);
const ROW_B_X =  (WALKWAY_W/2 + SHOP_DEPTH/2);
const OUTER_A  = ROW_A_X - SHOP_DEPTH/2 - BALCONY_W/2;
const OUTER_B  = ROW_B_X + SHOP_DEPTH/2 + BALCONY_W/2;

const STAIR_Z_DEPTH = 7.0;
const RUN_Z         = 3.0;
const LANDING_Z     = 1.0;
const STAIR_SPAN    = SHOP_DEPTH + BALCONY_W;
const RUN_STEPS     = 8;
const STEP_H        = FLOOR_H / (RUN_STEPS * 2);
const LANDING_X_W   = STAIR_SPAN * 0.16;
const STAIR_CENTER_X = ROW_A_X - BALCONY_W/2;
const STAIR_CENTER_X_B = ROW_B_X + BALCONY_W/2;

const SHOP_LEN    = 15;
const PARTITION_T = 0.6;
const shopStartZ  = -LAND_L/2 + 2.3;
function shopCenterZ(i) { return shopStartZ + SHOP_LEN/2 + i * (SHOP_LEN + PARTITION_T); }

const shopColorsA = [0xe07850, 0xd86840, 0xc86035, 0xd06a3e, 0xe07848];
const shopColorsB = [0x5088c0, 0x4878b0, 0x4570a8, 0x5080b8, 0x4e85c0];
const RAIL_COLOR = 0xb09030;

const floors = [null, null, null];
let wallOpacity = 0.5;
const allWalls = [];

// ============================================
// HELPERS
// ============================================
function box(w, h, d, color, opacity, x, y, z, shadow=true) {
  const m = new THREE.Mesh(
    new THREE.BoxGeometry(w, h, d),
    new THREE.MeshPhysicalMaterial({ color, transparent: opacity < 1, opacity, roughness: 0.5, metalness: 0.05, side: THREE.DoubleSide })
  );
  m.position.set(x, y, z); m.castShadow = false; m.receiveShadow = false;
  return m;
}
function wall(w, h, d, color, opacity, x, y, z) {
  const m = box(w, h, d, color, opacity, x, y, z); allWalls.push(m); return m;
}
function slab(w, d, color, x, y, z) { return box(w, 0.4, d, color, 1, x, y, z, false); }

// ============================================
// GROUND & ROADS
// ============================================
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(250, 250),
  new THREE.MeshStandardMaterial({ color: 0x2a2a3a, roughness: 0.9 })
);
ground.rotation.x = -Math.PI/2; ground.position.y = -0.1; ground.receiveShadow = true;
scene.add(ground);

const ROAD_W = 18;
for (let side of [-1, 1]) {
  const rz = side * (LAND_L/2 + STAIR_Z_DEPTH + ROAD_W/2 + 2);
  scene.add(box(100, 0.3, ROAD_W, 0x3a3a3a, 1, 0, 0.1, rz, false));
  scene.add(box(80, 0.06, 0.5, 0xcccc44, 1, 0, 0.3, rz, false));
  for (let i = -35; i < 35; i += 6) {
    scene.add(box(3, 0.06, 0.3, 0xffffff, 0.7, i, 0.3, rz - 4, false));
    scene.add(box(3, 0.06, 0.3, 0xffffff, 0.7, i, 0.3, rz + 4, false));
  }
  scene.add(box(50, 0.25, 3, 0x555555, 1, 0, 0.15, side * (LAND_L/2 + STAIR_Z_DEPTH + 1.5), false));
}

// ============================================
// BUILD FLOORS
// ============================================
for (let fl = 0; fl < 3; fl++) {
  const grp = new THREE.Group();
  const by = fl * FLOOR_H;

  const slabW = WALKWAY_W + SHOP_DEPTH * 2;
  grp.add(slab(slabW, LAND_L, fl === 2 ? 0x8a7090 : 0x888880, 0, by, 0));

  if (fl < 2) {
    if (fl === 0) {
      for (let side of [-1, 1]) {
        const px = side * (WALKWAY_W/2 + SHOP_DEPTH + BALCONY_W/2);
        grp.add(box(BALCONY_W, 0.2, LAND_L - 1, 0x888860, 0.9, px, by + 0.2, 0, false));
        for (let p = -LAND_L/2 + 3; p < LAND_L/2 - 2; p += 5)
          grp.add(box(BALCONY_W - 0.3, 0.06, 0.15, 0xffff88, 0.8, px, by + 0.35, p, false));
        for (let p = -LAND_L/2 + 4; p < LAND_L/2 - 3; p += 6) {
          grp.add(box(BALCONY_W - 0.4, 1.2, 3.2, 0x444444, 1, px, by + 0.8, p));
          grp.add(box(0.7, 0.3, 1.3, 0x222222, 1, px, by + 1.5, p + 0.3));
          grp.add(box(BALCONY_W - 0.8, 0.15, 0.2, 0x999999, 1, px, by + 1.7, p - 1.0));
        }
      }
    } else {
      const WALK_BAL_W = 5;
      const totalLen = LAND_L - 1 + STAIR_Z_DEPTH * 2;
      for (let side of [-1, 1]) {
        const shopOuterX = side * (WALKWAY_W/2 + SHOP_DEPTH);
        const bpx        = shopOuterX + side * WALK_BAL_W/2;
        const outerRailX = shopOuterX + side * WALK_BAL_W;
        grp.add(box(WALK_BAL_W, 0.25, totalLen, 0x607850, 1, bpx, by + 0.25, 0, false));
        grp.add(box(0.15, 0.15, totalLen, RAIL_COLOR, 1, outerRailX, by + 3.0, 0));
        grp.add(box(0.15, 0.15, totalLen, RAIL_COLOR, 1, outerRailX, by + 1.5, 0));
        for (let p = -LAND_L/2 + 2; p < LAND_L/2 - 1; p += 2.5)
          grp.add(box(0.15, 3.0, 0.15, RAIL_COLOR, 1, outerRailX, by + 1.5, p));
        for (let endSide of [-1, 1]) {
          const endZ = endSide * LAND_L/2;
          grp.add(box(WALK_BAL_W, 0.15, 0.15, RAIL_COLOR, 1, bpx, by + 3.0, endZ));
          grp.add(box(WALK_BAL_W, 0.15, 0.15, RAIL_COLOR, 1, bpx, by + 1.5, endZ));
          for (let px = shopOuterX; Math.abs(px) <= Math.abs(outerRailX) + 0.1; px += side * 1.5)
            grp.add(box(0.15, 3.0, 0.15, RAIL_COLOR, 1, px, by + 1.5, endZ));
        }
        for (let p = -LAND_L/2 + 5; p < LAND_L/2 - 4; p += 8) {
          grp.add(box(1.2, 1.0, 2.5, 0x5a3a1a, 1, shopOuterX + side * 0.8, by + 0.9, p));
          grp.add(box(1.0, 0.7, 2.2, 0x228844, 0.85, shopOuterX + side * 0.8, by + 1.7, p));
        }
      }
    }

    for (let i = 0; i < 5; i++) {
      const sz = shopCenterZ(i);
      const wh = FLOOR_H - 1.5;
      const wy = by + wh/2 + 0.2;

      const cA = shopColorsA[i];
      const leftEdgeA  = ROW_A_X - SHOP_DEPTH/2;
      const rightEdgeA = ROW_A_X + SHOP_DEPTH/2;
      grp.add(wall(WALL_T, wh, SHOP_LEN, cA, wallOpacity, leftEdgeA, wy, sz));
      grp.add(wall(SHOP_DEPTH, wh, WALL_T, cA, wallOpacity, ROW_A_X, wy, sz - SHOP_LEN/2));
      grp.add(wall(SHOP_DEPTH, wh, WALL_T, cA, wallOpacity, ROW_A_X, wy, sz + SHOP_LEN/2));
      grp.add(box(SHOP_DEPTH - 1, 0.08, SHOP_LEN - 1, cA, 0.3, ROW_A_X, by + 0.3, sz, false));

      const cB = shopColorsB[i];
      const leftEdgeB  = ROW_B_X - SHOP_DEPTH/2;
      const rightEdgeB = ROW_B_X + SHOP_DEPTH/2;
      grp.add(wall(WALL_T, wh, SHOP_LEN, cB, wallOpacity, rightEdgeB, wy, sz));
      grp.add(wall(SHOP_DEPTH, wh, WALL_T, cB, wallOpacity, ROW_B_X, wy, sz - SHOP_LEN/2));
      grp.add(wall(SHOP_DEPTH, wh, WALL_T, cB, wallOpacity, ROW_B_X, wy, sz + SHOP_LEN/2));
      grp.add(box(SHOP_DEPTH - 1, 0.08, SHOP_LEN - 1, cB, 0.3, ROW_B_X, by + 0.3, sz, false));
    }

    grp.add(box(WALKWAY_W, 0.15, LAND_L - 2, 0x70a060, 0.5, 0, by + 0.25, 0, false));
    for (let z = -LAND_L/2 + 3; z < LAND_L/2 - 2; z += 3)
      grp.add(box(2.5, 0.08, 1.5, 0x88b870, 0.6, 0, by + 0.35, z, false));

    for (let t = 0; t < 3; t++) {
      const tz = -22 + t * 22;
      grp.add(box(2, 0.25, 6, 0x8B6914, 1, 0, by + 2.8, tz));
      for (let lx of [-0.8, 0.8]) for (let lz of [-2.5, 2.5])
        grp.add(box(0.2, 2.5, 0.2, 0x6B4914, 1, lx, by + 1.5, tz + lz));
      for (let s of [-1, 1]) {
        grp.add(box(0.8, 0.15, 5, 0x9B7924, 1, s * 1.8, by + 1.7, tz));
        for (let lz of [-2, 2])
          grp.add(box(0.15, 1.5, 0.15, 0x6B4914, 1, s * 1.8, by + 0.9, tz + lz));
      }
    }

  } else {
    {
      const WALK_BAL_W = 5;
      const totalLen = LAND_L - 1 + STAIR_Z_DEPTH * 2;
      for (let side of [-1, 1]) {
        const shopOuterX = side * (WALKWAY_W/2 + SHOP_DEPTH);
        const bpx        = shopOuterX + side * WALK_BAL_W/2;
        const outerRailX = shopOuterX + side * WALK_BAL_W;
        grp.add(box(WALK_BAL_W, 0.25, totalLen, 0x607850, 1, bpx, by + 0.25, 0, false));
        grp.add(box(0.15, 0.15, totalLen, RAIL_COLOR, 1, outerRailX, by + 3.0, 0));
        grp.add(box(0.15, 0.15, totalLen, RAIL_COLOR, 1, outerRailX, by + 1.5, 0));
        for (let p = -LAND_L/2 + 2; p < LAND_L/2 - 1; p += 2.5)
          grp.add(box(0.15, 3.0, 0.15, RAIL_COLOR, 1, outerRailX, by + 1.5, p));
        for (let endSide of [-1, 1]) {
          const endZ = endSide * LAND_L/2;
          grp.add(box(WALK_BAL_W, 0.15, 0.15, RAIL_COLOR, 1, bpx, by + 3.0, endZ));
          grp.add(box(WALK_BAL_W, 0.15, 0.15, RAIL_COLOR, 1, bpx, by + 1.5, endZ));
          for (let px = shopOuterX; Math.abs(px) <= Math.abs(outerRailX) + 0.1; px += side * 1.5)
            grp.add(box(0.15, 3.0, 0.15, RAIL_COLOR, 1, px, by + 1.5, endZ));
        }
        for (let p = -LAND_L/2 + 5; p < LAND_L/2 - 4; p += 8) {
          grp.add(box(1.2, 1.0, 2.5, 0x5a3a1a, 1, shopOuterX + side * 0.8, by + 0.9, p));
          grp.add(box(1.0, 0.7, 2.2, 0x228844, 0.85, shopOuterX + side * 0.8, by + 1.7, p));
        }
      }
    }

    const roomDepth = SHOP_DEPTH;
    const bathDepth = WALKWAY_W / 2;
    const unitLen   = LAND_L - 2;
    const wh = FLOOR_H - 1.5;
    const wy = by + wh/2 + 0.2;

    const outerA = -(WALKWAY_W/2 + roomDepth);
    const outerB =  (WALKWAY_W/2 + roomDepth);
    const innerA = -WALKWAY_W/2;
    const innerB =  WALKWAY_W/2;

    const roomACX = (outerA + innerA) / 2;
    grp.add(wall(WALL_T, wh, unitLen, 0xa070c0, wallOpacity, outerA, wy, 0));
    grp.add(wall(WALL_T, wh, unitLen * 0.4, 0xa070c0, wallOpacity, innerA, wy, -unitLen * 0.3));
    grp.add(wall(WALL_T, wh, unitLen * 0.4, 0xa070c0, wallOpacity, innerA, wy,  unitLen * 0.3));
    {
      const dW = 3.0, dH = 7.0, seg = (roomDepth - dW) / 2;
      grp.add(wall(seg, wh, WALL_T, 0xa070c0, wallOpacity, roomACX - dW/2 - seg/2, wy, -unitLen/2));
      grp.add(wall(seg, wh, WALL_T, 0xa070c0, wallOpacity, roomACX + dW/2 + seg/2, wy, -unitLen/2));
      grp.add(wall(dW, wh - dH, WALL_T, 0xa070c0, wallOpacity, roomACX, by + dH + (wh-dH)/2 + 0.2, -unitLen/2));
    }
    grp.add(wall(roomDepth, wh, WALL_T, 0xa070c0, wallOpacity, roomACX, wy, unitLen/2));
    grp.add(box(roomDepth - 0.5, 0.1, unitLen - 0.5, 0xc09070, 0.4, roomACX, by + 0.3, 0, false));
    grp.add(box(5, 1.0, 7, 0x8B6050, 1, roomACX - 3, by + 0.7, -unitLen/2 + 5));
    grp.add(box(5, 0.35, 1, 0x6B4030, 1, roomACX - 3, by + 1.3, -unitLen/2 + 1.8));
    grp.add(box(3, 5, 2, 0x705030, 0.95, roomACX + 4, by + 2.5, -unitLen/2 + 2));

    const roomBCX = (innerB + outerB) / 2;
    grp.add(wall(WALL_T, wh, unitLen, 0x9068b0, wallOpacity, outerB, wy, 0));
    grp.add(wall(WALL_T, wh, unitLen * 0.4, 0x9068b0, wallOpacity, innerB, wy, -unitLen * 0.3));
    grp.add(wall(WALL_T, wh, unitLen * 0.4, 0x9068b0, wallOpacity, innerB, wy,  unitLen * 0.3));
    grp.add(wall(roomDepth, wh, WALL_T, 0x9068b0, wallOpacity, roomBCX, wy, -unitLen/2));
    {
      const dW = 3.0, dH = 7.0, seg = (roomDepth - dW) / 2;
      grp.add(wall(seg, wh, WALL_T, 0x9068b0, wallOpacity, roomBCX - dW/2 - seg/2, wy,  unitLen/2));
      grp.add(wall(seg, wh, WALL_T, 0x9068b0, wallOpacity, roomBCX + dW/2 + seg/2, wy,  unitLen/2));
      grp.add(wall(dW, wh - dH, WALL_T, 0x9068b0, wallOpacity, roomBCX, by + dH + (wh-dH)/2 + 0.2, unitLen/2));
    }
    grp.add(box(roomDepth - 0.5, 0.1, unitLen - 0.5, 0xb08070, 0.4, roomBCX, by + 0.3, 0, false));
    grp.add(box(5, 1.0, 7, 0x8B6050, 1, roomBCX + 3, by + 0.7, -unitLen/2 + 5));
    grp.add(box(5, 0.35, 1, 0x6B4030, 1, roomBCX + 3, by + 1.3, -unitLen/2 + 1.8));
    grp.add(box(3, 5, 2, 0x705030, 0.95, roomBCX - 4, by + 2.5, -unitLen/2 + 2));

    grp.add(wall(WALKWAY_W, wh, WALL_T, 0x607080, wallOpacity, 0, wy, 0));
    grp.add(wall(WALL_T, wh, unitLen, 0x607080, wallOpacity, -WALKWAY_W/2, wy, 0));
    grp.add(wall(WALL_T, wh, unitLen, 0x607080, wallOpacity,  WALKWAY_W/2, wy, 0));

// Switchback staircases
function buildStair(parent, endSide, floorIndex, enterFromRight, centerX) {
  const sLeft  = centerX - STAIR_SPAN/2;
  const sRight = centerX + STAIR_SPAN/2;
  const sMid   = centerX;
  const by     = floorIndex * FLOOR_H;
  const wallZ  = endSide * LAND_L/2;
  const outDir = endSide;
  const treadW = (STAIR_SPAN - LANDING_X_W) / 2 / RUN_STEPS;

  const zRun1  = wallZ + outDir * (RUN_Z + LANDING_Z + RUN_Z/2);
  const zLand  = wallZ + outDir * (RUN_Z + LANDING_Z/2);
  const zRun2  = wallZ + outDir * (RUN_Z/2);

  const run1StartX = enterFromRight ? sRight : sLeft;
  const run1DirX   = enterFromRight ? -1 : +1;
  const run2StartX = enterFromRight ? sLeft  : sRight;
  const run2DirX   = enterFromRight ? +1 : -1;
  const runSpan    = RUN_STEPS * treadW;

  for (let s = 0; s < RUN_STEPS; s++) {
    const stepX = run1StartX + run1DirX * (s + 0.5) * treadW;
    const stepY = by + (s + 0.5) * STEP_H;
    parent.add(box(treadW, STEP_H, RUN_Z, STEP_COLOR, 1, stepX, stepY, zRun1));
  }

  const halfH      = by + FLOOR_H/2;
  const landZ      = wallZ + outDir * (STAIR_Z_DEPTH / 2);
  const halfLandW  = STAIR_SPAN / 2;
  const halfLandCX = enterFromRight ? (sLeft + sMid) / 2 : (sMid + sRight) / 2;
  const outerEdgeX = enterFromRight ? sLeft : sRight;
  const zOuter     = wallZ + outDir * STAIR_Z_DEPTH;
  parent.add(box(halfLandW, 0.35, STAIR_Z_DEPTH, STEP_COLOR, 1, halfLandCX, halfH, landZ));

  const RH_land = 2.8;
  parent.add(box(0.15, 0.15, STAIR_Z_DEPTH, RAIL_COLOR, 1, outerEdgeX, halfH + RH_land,       landZ));
  parent.add(box(0.15, 0.15, STAIR_Z_DEPTH, RAIL_COLOR, 1, outerEdgeX, halfH + RH_land * 0.5, landZ));
  const zS = wallZ + outDir * 0.3, zE = wallZ + outDir * (STAIR_Z_DEPTH - 0.3);
  for (let lz = Math.min(zS,zE); lz <= Math.max(zS,zE); lz += 1.5)
    parent.add(box(0.15, RH_land, 0.15, RAIL_COLOR, 1, outerEdgeX, halfH + RH_land/2, lz));
  parent.add(box(halfLandW, 0.15, 0.15, RAIL_COLOR, 1, halfLandCX, halfH + RH_land,       zOuter));
  parent.add(box(halfLandW, 0.15, 0.15, RAIL_COLOR, 1, halfLandCX, halfH + RH_land * 0.5, zOuter));
  const xS = enterFromRight ? sLeft : sMid, xE = enterFromRight ? sMid : sRight;
  for (let lx = xS + 0.3; lx <= xE - 0.3; lx += 1.5)
    parent.add(box(0.15, RH_land, 0.15, RAIL_COLOR, 1, lx, halfH + RH_land/2, zOuter));

  for (let s = 0; s < RUN_STEPS; s++) {
    const stepX = sMid + run2DirX * (s + 0.5) * treadW;
    const stepY = by + FLOOR_H/2 + (s + 0.5) * STEP_H;
    parent.add(box(treadW, STEP_H, RUN_Z, STEP_COLOR, 1, stepX, stepY, zRun2));
  }

  const arrX = sMid + run2DirX * RUN_STEPS * treadW;
  parent.add(box(LANDING_X_W, 0.35, RUN_Z, STEP_COLOR, 1, arrX, by + FLOOR_H, zRun2));

  const RH = 2.8;
  function addDiagRail(startX, startY, endX, endY, railZ) {
    const dx = endX - startX, dy = endY - startY;
    const len = Math.sqrt(dx*dx + dy*dy);
    const mat = new THREE.MeshPhysicalMaterial({ color: RAIL_COLOR, roughness: 0.4, metalness: 0.3 });
    const geo = new THREE.CylinderGeometry(0.08, 0.08, len, 6);
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set((startX+endX)/2, (startY+endY)/2 + RH, railZ);
    mesh.rotation.z = -(Math.PI/2 - Math.atan2(dy, dx));
    parent.add(mesh);
    for (let s = 0; s <= RUN_STEPS; s += 2) {
      const t = s / RUN_STEPS;
      parent.add(box(0.15, RH, 0.15, RAIL_COLOR, 1, startX + t*dx, startY + t*dy + RH/2, railZ));
    }
  }
  const railZ1 = wallZ + outDir * (STAIR_Z_DEPTH - 0.2);
  addDiagRail(run1StartX, by, run1StartX + run1DirX * runSpan, by + FLOOR_H/2, railZ1);
  const railZ2 = wallZ + outDir * 0.3;
  addDiagRail(sMid, by + FLOOR_H/2, sMid + run2DirX * runSpan, by + FLOOR_H, railZ2);
}

    scene.add(box(3, 2.5, 4, 0x664422, 1, px, roofY + 1.8, pz));
    scene.add(box(2.5, 1.5, 3.5, 0x33aa33, 0.8, px, roofY + 3.5, pz));
  }
}

const TANK_LIFT   = ROOM_H + 5;
const TANK_W      = LAND_W * 0.28;
const TANK_D      = LAND_L * 0.18;
const TANK_H      = 5;
const TANK_CX     = 0;
const TANK_CZ     = ROOM_CZ + ROOM_L/2 - TANK_D/2 - 1;
const COL_H       = TANK_LIFT - ROOM_H - 0.4;

for (let cx of [-TANK_W/2 + 1, TANK_W/2 - 1]) {
  for (let cz of [TANK_CZ - TANK_D/2 + 1, TANK_CZ + TANK_D/2 - 1]) {
    scene.add(box(1.2, COL_H, 1.2, 0x555555, 1, cx, REST_Y + ROOM_H + COL_H/2, cz));
  }
}
scene.add(box(TANK_W - 2, 0.5, 0.5, 0x555555, 1, TANK_CX, REST_Y + ROOM_H + COL_H * 0.5, TANK_CZ - TANK_D/2 + 1));
scene.add(box(TANK_W - 2, 0.5, 0.5, 0x555555, 1, TANK_CX, REST_Y + ROOM_H + COL_H * 0.5, TANK_CZ + TANK_D/2 - 1));
scene.add(box(0.5, 0.5, TANK_D - 2, 0x555555, 1, -TANK_W/2 + 1, REST_Y + ROOM_H + COL_H * 0.5, TANK_CZ));
scene.add(box(0.5, 0.5, TANK_D - 2, 0x555555, 1,  TANK_W/2 - 1, REST_Y + ROOM_H + COL_H * 0.5, TANK_CZ));
scene.add(box(TANK_W, TANK_H, TANK_D, 0x2a3a4a, 1, TANK_CX, REST_Y + TANK_LIFT + TANK_H/2, TANK_CZ));
scene.add(box(TANK_W + 0.5, 0.6, TANK_D + 0.5, 0x1a2a3a, 1, TANK_CX, REST_Y + TANK_LIFT + TANK_H + 0.3, TANK_CZ));
scene.add(box(0.4, COL_H + TANK_H, 0.4, 0x777777, 1, TANK_CX - TANK_W/3, REST_Y + ROOM_H + (COL_H + TANK_H)/2, TANK_CZ));

scene.add(box(LAND_W, 0.05, 0.15, 0xffff00, 0.5, 0, 0.5, -LAND_L/2 - STAIR_Z_DEPTH - 8, false));
scene.add(box(0.15, 0.05, LAND_L, 0xffff00, 0.5, -LAND_W/2 - 5, 0.5, 0, false));

// ============================================
// ORBIT CONTROLS
// ============================================
let isMouseDown = false, isPanning = false, mouseX = 0, mouseY = 0;
let theta = Math.PI/4, phi = Math.PI/4, radius = 140;
let target = new THREE.Vector3(0, 15, 0);

function updateCamera() {
  camera.position.x = target.x + radius * Math.sin(phi) * Math.cos(theta);
  camera.position.y = target.y + radius * Math.cos(phi);
  camera.position.z = target.z + radius * Math.sin(phi) * Math.sin(theta);
  camera.lookAt(target);
}

renderer.domElement.addEventListener('mousedown', e => {
  if (e.button === 0) isMouseDown = true;
  if (e.button === 2) isPanning = true;
  mouseX = e.clientX; mouseY = e.clientY;
});
renderer.domElement.addEventListener('mousemove', e => {
  const dx = e.clientX - mouseX, dy = e.clientY - mouseY;
  mouseX = e.clientX; mouseY = e.clientY;
  if (isMouseDown) {
    theta += dx * 0.005;
    phi = Math.max(0.1, Math.min(Math.PI/2 - 0.05, phi - dy * 0.005));
    updateCamera();
  }
  if (isPanning) {
    const s = radius * 0.002;
    const right = new THREE.Vector3();
    right.crossVectors(camera.getWorldDirection(new THREE.Vector3()), new THREE.Vector3(0,1,0)).normalize();
    target.add(right.multiplyScalar(-dx * s));
    target.y += dy * s; updateCamera();
  }
});
renderer.domElement.addEventListener('mouseup', () => { isMouseDown = false; isPanning = false; });
renderer.domElement.addEventListener('contextmenu', e => e.preventDefault());
renderer.domElement.addEventListener('wheel', e => {
  radius = Math.max(30, Math.min(260, radius + e.deltaY * 0.1)); updateCamera();
});
let lastTouchDist = 0;
renderer.domElement.addEventListener('touchstart', e => {
  if (e.touches.length === 1) { isMouseDown = true; mouseX = e.touches[0].clientX; mouseY = e.touches[0].clientY; }
  else if (e.touches.length === 2) lastTouchDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
});
renderer.domElement.addEventListener('touchmove', e => {
  e.preventDefault();
  if (e.touches.length === 1 && isMouseDown) {
    const dx = e.touches[0].clientX - mouseX, dy = e.touches[0].clientY - mouseY;
    mouseX = e.touches[0].clientX; mouseY = e.touches[0].clientY;
    theta += dx * 0.005;
    phi = Math.max(0.1, Math.min(Math.PI/2 - 0.05, phi - dy * 0.005));
    updateCamera();
  } else if (e.touches.length === 2) {
    const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
    radius = Math.max(30, Math.min(260, radius - (dist - lastTouchDist) * 0.5));
    lastTouchDist = dist; updateCamera();
  }
}, { passive: false });
renderer.domElement.addEventListener('touchend', () => { isMouseDown = false; });
updateCamera();

// ============================================
// UI CONTROLS
// ============================================
function showFloor(f) {
  document.querySelectorAll('#ui-panel .control-group:nth-child(2) .btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  floors.forEach((g, i) => { g.visible = (f === 'all' || i === f); });
  stairGroup.visible = true;
}
function setTransparency(val) {
  wallOpacity = val;
  document.querySelectorAll('#ui-panel .control-group:nth-child(3) .btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  allWalls.forEach(w => { w.material.opacity = val; w.material.transparent = val < 1; w.material.needsUpdate = true; });
}
function setView(view) {
  document.querySelectorAll('#ui-panel .control-group:nth-child(4) .btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  target.set(0, 15, 0);
  switch(view) {
    case 'front':       theta = 0;          phi = Math.PI/6;  radius = 140; break;
    case 'top':         theta = 0;          phi = 0.12;       radius = 150; break;
    case 'side':        theta = Math.PI/2;  phi = Math.PI/5;  radius = 140; break;
    case 'perspective': theta = Math.PI/4;  phi = Math.PI/4;  radius = 140; break;
  }
  updateCamera();
}

(function animate() { requestAnimationFrame(animate); renderer.render(scene, camera); })();
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
